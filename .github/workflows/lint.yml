# what is the goal of this workflows - whenever someone change the python code, linter will check at that time. this is the updated file 
name: Auto linter

on:
  push:
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
    # This step automatically clone the code from current branch into the runner 
      - name: checkout/ clone the code
        uses: actions/checkout@v7 
        # This code will install linter 
      - name: Installer Linter 
        run: pip install ruff
        # This code will check the code 
      - name: check the file for linting 
        run: ruff check .
    
